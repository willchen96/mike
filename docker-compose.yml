services:
  minio:
    image: minio/minio:latest
    container_name: mike-minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: mike-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/mike
        exit 0
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mike-backend
    env_file:
      - path: ./backend/.env.docker
        required: false
    environment:
      - PORT=3001
      - FRONTEND_URL=http://localhost:4000
    ports:
      - "4001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm install && exec npm run dev"
    depends_on:
      - minio-init
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mike-frontend
    env_file:
      - path: ./frontend/.env.local.docker
        required: false
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4001
    ports:
      - "4000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: sh -c "npm install --legacy-peer-deps && exec npm run dev -- -H 0.0.0.0 -p 3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
  minio_data:
